version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: jobtrack-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - jobtrack-network

  backend:
    build: ./backend
    container_name: jobtrack-backend
    ports:
      - "5001:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/jobtrack
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GHOST_THRESHOLD_DAYS=${GHOST_THRESHOLD_DAYS:-10}
      - COGNITO_USER_POOL_ID=${COGNITO_USER_POOL_ID}
      - COGNITO_CLIENT_ID=${COGNITO_CLIENT_ID}
      - COGNITO_REGION=${COGNITO_REGION}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=${AWS_REGION}
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      - mongodb
    networks:
      - jobtrack-network

  frontend:
    build: ./frontend
    container_name: jobtrack-frontend
    ports:
      - "4200:4200"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - jobtrack-network

networks:
  jobtrack-network:
    driver: bridge

volumes:
  mongo-data:
    driver: local
