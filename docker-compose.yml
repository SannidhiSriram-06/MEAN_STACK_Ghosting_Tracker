version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: jobtrack-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - jobtrack-network

  backend:
    build: ./backend
    container_name: jobtrack-backend
    ports:
      - "5001:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/jobtrack
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GHOST_THRESHOLD_DAYS=${GHOST_THRESHOLD_DAYS:-10}
      - CLERK_PEM_PUBLIC_KEY=${CLERK_PEM_PUBLIC_KEY}
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      - mongodb
    networks:
      - jobtrack-network

  frontend:
    build: ./frontend
    container_name: jobtrack-frontend
    ports:
      - "4200:4200"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - jobtrack-network

networks:
  jobtrack-network:
    driver: bridge

volumes:
  mongo-data:
    driver: local
